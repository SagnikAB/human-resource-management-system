name: Backend CI/CD — Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hrms_test
          POSTGRES_PASSWORD: hrms_test_pass
          POSTGRES_DB: hrms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'True'
          DATABASE_URL: postgresql://hrms_test:hrms_test_pass@localhost:5432/hrms_test
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          DJANGO_SETTINGS_MODULE: hrms.settings.development

      - name: Run Django system checks
        run: python manage.py check
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'True'
          DATABASE_URL: postgresql://hrms_test:hrms_test_pass@localhost:5432/hrms_test
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          DJANGO_SETTINGS_MODULE: hrms.settings.development

      - name: Seed demo data
        run: python manage.py create_demo_data
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'True'
          DATABASE_URL: postgresql://hrms_test:hrms_test_pass@localhost:5432/hrms_test
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          DJANGO_SETTINGS_MODULE: hrms.settings.development

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt bandit safety

      - name: Run bandit (SAST)
        run: bandit -r apps/ hrms/ -ll -x apps/*/migrations/

      - name: Check for known vulnerabilities
        run: safety check --full-report

  deploy-production:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail
        # OR for Railway — uncomment below:
        # - name: Deploy to Railway
        #   uses: bervProject/railway-deploy@main
        #   with:
        #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
        #     service: hrms-backend
